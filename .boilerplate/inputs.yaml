# Module configuration

# (Required) Name of the existing Azure Key Vault for credential storage.
key_vault_name: "my-keyvault"

# (Required) Resource group name of the existing Azure Key Vault.
key_vault_resource_group_name: "rg-shared"

settings:
  name_prefix: "mydb"              # (Required) Name prefix for the server resource.
  database_name: "postgres"        # (Optional) Initial database name. Default: "postgres".
  administrator_login: "adminuser" # (Optional) Admin username. Default: "adminuser".
  version: "16"                    # (Required) PostgreSQL major version. Possible values: 11, 12, 13, 14, 15, 16.
  sku_name: "B_Standard_B1ms"      # (Required) Compute SKU. Possible values: B_Standard_B1ms, GP_Standard_D2ds_v4, etc.
  storage_mb: 32768                # (Optional) Storage size in MB. Default: 32768 (32 GB). Min: 32768.
  storage_tier: "P4"               # (Optional) Storage tier. Default determined by storage_mb.
  backup_retention_days: 7         # (Optional) Backup retention days, 7-35. Default: 7.
  geo_redundant_backup: false      # (Optional) Geo-redundant backup. Default: false.
  zone: ""                         # (Optional) Availability zone ("1", "2", "3"). Default: "".
  create_mode: "Default"           # (Optional) Default, PointInTimeRestore, Replica, GeoRestore. Default: "Default".
  high_availability:
    enabled: false                 # (Optional) Enable HA. Default: false.
    mode: "ZoneRedundant"          # (Optional) SameZone or ZoneRedundant. Default: ZoneRedundant.
    standby_zone: ""               # (Optional) Standby AZ. Default: "".
  maintenance:
    day_of_week: 0                 # (Optional) 0=Sunday..6=Saturday. Default: 0.
    start_hour: 0                  # (Optional) 0-23 UTC. Default: 0.
    start_minute: 0                # (Optional) 0-59. Default: 0.
  databases: {}                    # (Optional) Map of additional databases: {key: {name, charset, collation}}.
  parameters: []                   # (Optional) List of {name, value} server configuration parameters.
  hoop:
    enabled: false                 # (Optional) Generate hoop_connections output. Default: false.
    agent_id: ""                   # (Required when enabled) Hoop agent UUID.
    community: true                # (Optional) true=community (no sub-key); false=enterprise. Default: true.
    import: false                  # (Optional) Import existing Hoop connection. Default: false.
    tags: {}                       # (Optional) Tags map for Hoop connection.
    access_control: []             # (Optional) Access control groups.

network:
  delegated_subnet_id: ""          # (Optional) Subnet ID for VNet injection (private access).
  private_dns_zone_id: ""          # (Optional) Required when delegated_subnet_id is set.
  public_network_access: true      # (Optional) Allow public network access. Default: true.
  firewall_rules: []               # (Optional) List of firewall rules for public access.
  #  - name: "office"              #   (Required) Rule name.
  #    start_ip: "203.0.113.0"     #   (Required) Start IP.
  #    end_ip: "203.0.113.255"     #   (Required) End IP.
